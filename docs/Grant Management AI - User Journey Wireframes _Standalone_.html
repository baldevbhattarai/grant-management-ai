document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\n    border-radius: 3px;\n    border: 2px solid var(--ink);\n  }\n  .legend-box.entry { background: var(--accent); border-color: var(--accent); }\n  .legend-box.ai { background: var(--ai-light); border: 2px dashed var(--ai); }\n  .legend-box.screen { background: #fff; border-color: var(--ink); }\n\n  /* ─── RELATIVE WRAPPER FOR CHAT SCREEN ─────────── */\n  .wf-relative { position: relative; min-height: 440px; }\n\n  /* Multi-section grid layout */\n  .two-col-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }\n\n  /* Number input */\n  .wf-number-input {\n    border: 1px solid var(--border);\n    border-radius: 4px;\n    padding: 6px 10px;\n    font-size: 13px;\n    width: 120px;\n    color: var(--ink2);\n    background: #fafafa;\n  }\n\n  /* Multiselect chips */\n  .wf-multiselect { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }\n  .wf-ms-chip {\n    font-size: 11px;\n    padding: 4px 10px;\n    border-radius: 14px;\n    background: var(--surface3);\n    border: 1px solid var(--border);\n    color: var(--ink2);\n    cursor: pointer;\n  }\n  .wf-ms-chip.sel { background: var(--accent); color: #fff; border-color: var(--accent); }\n\n  /* ─── FLOW DIAGRAM V2 ────────────────────────────── */\n  .journey-flow {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 0;\n  }\n  .jf-row {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 0;\n  }\n  .jf-node {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n  }\n  .jf-box {\n    width: 130px;\n    border: 2px solid var(--ink);\n    border-radius: 8px;\n    padding: 12px 10px 10px;\n    background: #fff;\n    text-align: center;\n  }\n  .jf-box.start { background: var(--accent); border-color: var(--accent); color: #fff; }\n  .jf-box.ai-float { border: 2px dashed var(--ai); background: var(--ai-light); }\n  .jf-box-icon { font-size: 20px; margin-bottom: 5px; }\n  .jf-box-label { font-size: 11px; font-weight: 700; line-height: 1.3; }\n  .jf-box-sub { font-size: 10px; margin-top: 2px; opacity: .7; }\n  .jf-box.start .jf-box-sub { color: rgba(255,255,255,.8); }\n  .jf-box.ai-float .jf-box-sub { color: var(--ai); }\n\n  .jf-arrow-h {\n    width: 50px;\n    height: 2px;\n    background: var(--border);\n    position: relative;\n    flex-shrink: 0;\n  }\n  .jf-arrow-h::after {\n    content: '▶';\n    position: absolute;\n    right: -8px;\n    top: 50%;\n    transform: translateY(-50%);\n    font-size: 10px;\n    color: var(--border);\n    line-height: 1;\n  }\n  .jf-arrow-v {\n    width: 2px;\n    height: 36px;\n    background: var(--border);\n    position: relative;\n  }\n  .jf-arrow-v::after {\n    content: '▼';\n    position: absolute;\n    bottom: -9px;\n    left: 50%;\n    transform: translateX(-50%);\n    font-size: 10px;\n    color: var(--border);\n    line-height: 1;\n  }\n  .jf-label {\n    font-size: 10px;\n    color: var(--ink3);\n    text-align: center;\n    margin-top: 5px;\n    max-width: 130px;\n  }\n  .jf-branch-line {\n    width: 200px;\n    height: 2px;\n    background: var(--border);\n    position: relative;\n  }\n  .jf-branch-left::before {\n    content: '▼';\n    position: absolute;\n    left: 20px;\n    top: 0;\n    font-size: 10px;\n    color: var(--border);\n    line-height: 1;\n    transform: translateX(-50%);\n  }\n  .jf-branch-right::after {\n    content: '▼';\n    position: absolute;\n    right: 20px;\n    top: 0;\n    font-size: 10px;\n    color: var(--border);\n    line-height: 1;\n    transform: translateX(50%);\n  }\n  .jf-branch-nodes {\n    display: flex;\n    align-items: flex-start;\n    gap: 40px;\n    margin-top: 16px;\n  }\n  .jf-condition {\n    font-size: 10px;\n    color: var(--ink3);\n    font-style: italic;\n    text-align: center;\n    margin-top: 4px;\n  }\n\n  /* Global floating badge */\n  .jf-global-wrap {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    margin-top: 24px;\n    gap: 4px;\n  }\n  .jf-global-note {\n    font-size: 11px;\n    color: var(--ai);\n    font-weight: 600;\n    letter-spacing: .02em;\n  }\n  .jf-global-desc {\n    font-size: 10px;\n    color: var(--ink3);\n    text-align: center;\n    max-width: 260px;\n  }\n\n  /* ─── SCROLL TARGET ──────────────────────────────── */\n  .scroll-target { scroll-margin-top: 24px; }\n\n<\u002Fstyle>\n\n\n<\u002Fhead>\n<body>\n\n<div class=\"doc-layout\">\n\n  <!-- ───────────── SIDEBAR ───────────── -->\n  <nav class=\"sidebar\">\n    <div class=\"sidebar-logo\">Grant Mgmt <span>AI<\u002Fspan><\u002Fdiv>\n\n    <div class=\"sidebar-section\">Overview<\u002Fdiv>\n    <a href=\"#journey\" class=\"sidebar-link nav\"><span class=\"dot\"><\u002Fspan> User Journey Map<\u002Fa>\n    <a href=\"#personas\" class=\"sidebar-link\"><span class=\"dot\"><\u002Fspan> User Personas<\u002Fa>\n\n    <div class=\"sidebar-section\">Screens<\u002Fdiv>\n    <a href=\"#screen-dashboard\" class=\"sidebar-link nav\"><span class=\"dot\"><\u002Fspan> Dashboard<\u002Fa>\n    <a href=\"#screen-report-list\" class=\"sidebar-link nav\"><span class=\"dot\"><\u002Fspan> Report List<\u002Fa>\n    <a href=\"#screen-report-form\" class=\"sidebar-link nav\"><span class=\"dot\"><\u002Fspan> Report Form<\u002Fa>\n    <a href=\"#screen-ai-suggestion\" class=\"sidebar-link ai\"><span class=\"dot\"><\u002Fspan> AI Suggestion<\u002Fa>\n    <a href=\"#screen-chat\" class=\"sidebar-link ai\"><span class=\"dot\"><\u002Fspan> AI Chat Widget<\u002Fa>\n\n    <div class=\"sidebar-section\">Reference<\u002Fdiv>\n    <a href=\"#nav-flows\" class=\"sidebar-link\"><span class=\"dot\"><\u002Fspan> Navigation Flows<\u002Fa>\n    <a href=\"#states\" class=\"sidebar-link\"><span class=\"dot\"><\u002Fspan> States &amp; Statuses<\u002Fa>\n  <\u002Fnav>\n\n  <!-- ───────────── MAIN ───────────── -->\n  <main class=\"main\">\n\n    <!-- DOC HEADER -->\n    <header class=\"doc-header\">\n      <div class=\"doc-tag\">Wireframe Document · v1.0 · April 2026<\u002Fdiv>\n      <h1 class=\"doc-title\">Grant Management AI<br>User Journey &amp; Wireframes<\u002Fh1>\n      <div class=\"doc-meta\">\n        <span>📄 5 Screens<\u002Fspan>\n        <span>🔀 3 Core User Flows<\u002Fspan>\n        <span>🤖 2 AI Features<\u002Fspan>\n        <span>📐 Angular Material · .NET API<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- ═══════════════════════════════════════\n         SECTION 1 — USER JOURNEY MAP\n    ══════════════════════════════════════════ -->\n    <section id=\"journey\" class=\"scroll-target\">\n      <div class=\"section-heading\">\n        <span class=\"section-num\">01<\u002Fspan>\n        <h2 class=\"section-title\">User Journey Map<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"section-desc\">\n        The complete end-to-end flow from landing on the application to submitting and reviewing a grant report, with AI-assisted content generation and a persistent Q&amp;A chatbot available at every step.\n      <\u002Fp>\n\n      <div class=\"flow-container\">\n        <div class=\"journey-flow\">\n\n          <!-- Row 1: Entry -->\n          <div class=\"jf-row\">\n            <div class=\"jf-node\">\n              <div class=\"jf-box start\">\n                <div class=\"jf-box-icon\">🏠<\u002Fdiv>\n                <div class=\"jf-box-label\">App Landing<\u002Fdiv>\n                <div class=\"jf-box-sub\">/dashboard<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"jf-label\">User opens app — auto-redirected to Dashboard<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Arrow down -->\n          <div class=\"jf-arrow-v\" style=\"margin: 8px 0;\"><\u002Fdiv>\n\n          <!-- Row 2: Dashboard -->\n          <div class=\"jf-row\">\n            <div class=\"jf-node\">\n              <div class=\"jf-box\">\n                <div class=\"jf-box-icon\">📋<\u002Fdiv>\n                <div class=\"jf-box-label\">Dashboard<\u002Fdiv>\n                <div class=\"jf-box-sub\">My Grants<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"jf-label\">Select demo user → View grant cards<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"jf-arrow-v\" style=\"margin: 8px 0;\"><\u002Fdiv>\n\n          <!-- Row 3: Report List -->\n          <div class=\"jf-row\">\n            <div class=\"jf-node\">\n              <div class=\"jf-box\">\n                <div class=\"jf-box-icon\">📑<\u002Fdiv>\n                <div class=\"jf-box-label\">Report List<\u002Fdiv>\n                <div class=\"jf-box-sub\">/grants/:id/reports<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"jf-label\">Click \"View Reports\" on any grant card<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"jf-arrow-v\" style=\"margin: 8px 0;\"><\u002Fdiv>\n\n          <!-- Row 4: Branch by status -->\n          <div style=\"display:flex; flex-direction:column; align-items:center;\">\n            <div style=\"font-size:10px; color:var(--ink3); font-style:italic; margin-bottom:6px;\">Branch by report status<\u002Fdiv>\n            <div style=\"display:flex; gap:80px; align-items:flex-start;\">\n\n              <!-- Draft branch -->\n              <div class=\"jf-node\">\n                <div class=\"jf-box\" style=\"border-color: var(--amber); background: var(--amber-light);\">\n                  <div class=\"jf-box-icon\">✏️<\u002Fdiv>\n                  <div class=\"jf-box-label\">Report Form<\u002Fdiv>\n                  <div class=\"jf-box-sub\" style=\"color:var(--amber);\">Draft · Fill &amp; Save<\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"jf-condition\">\"Fill Report\" button<\u002Fdiv>\n                <div class=\"jf-arrow-v\" style=\"margin: 8px 0;\"><\u002Fdiv>\n                <div class=\"jf-box\" style=\"border-color: var(--ai); background: var(--ai-light);\">\n                  <div class=\"jf-box-icon\">✨<\u002Fdiv>\n                  <div class=\"jf-box-label\">AI Suggestion<\u002Fdiv>\n                  <div class=\"jf-box-sub\" style=\"color: var(--ai);\">Per text section<\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"jf-condition\">Accept → populates field<\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- Approved branch -->\n              <div class=\"jf-node\">\n                <div class=\"jf-box\" style=\"border-color: var(--green); background: var(--green-light);\">\n                  <div class=\"jf-box-icon\">👁️<\u002Fdiv>\n                  <div class=\"jf-box-label\">Report Form<\u002Fdiv>\n                  <div class=\"jf-box-sub\" style=\"color:var(--green);\">Approved · Read-only<\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"jf-condition\">\"View\" button<\u002Fdiv>\n              <\u002Fdiv>\n\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n\n        <!-- Global AI note -->\n        <div class=\"jf-global-wrap\">\n          <div style=\"width:100%; border-top: 1px dashed var(--ai); margin: 20px 0 12px;\"><\u002Fdiv>\n          <div class=\"jf-box ai-float\" style=\"width: 220px;\">\n            <div class=\"jf-box-icon\">🤖<\u002Fdiv>\n            <div class=\"jf-box-label\">AI Chat Widget<\u002Fdiv>\n            <div class=\"jf-box-sub\">Available on ALL screens<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"jf-global-note\">Persistent floating assistant<\u002Fdiv>\n          <div class=\"jf-global-desc\">Ask questions about any grant or report period using semantic search. Floats over every page.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Legend -->\n        <div class=\"legend\">\n          <div class=\"legend-item\"><span class=\"legend-box entry\"><\u002Fspan> Entry point<\u002Fdiv>\n          <div class=\"legend-item\"><span class=\"legend-box screen\"><\u002Fspan> Screen / page<\u002Fdiv>\n          <div class=\"legend-item\"><span class=\"legend-box ai\"><\u002Fspan> AI feature<\u002Fdiv>\n          <div class=\"legend-item\" style=\"font-size:11px; color:var(--ink3);\">── Navigation path &nbsp;&nbsp; - - Conditional branch<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <hr class=\"section-divider\">\n\n    <!-- ═══════════════════════════════════════\n         SECTION 2 — PERSONAS\n    ══════════════════════════════════════════ -->\n    <section id=\"personas\" class=\"scroll-target\">\n      <div class=\"section-heading\">\n        <span class=\"section-num\">02<\u002Fspan>\n        <h2 class=\"section-title\">User Personas<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"section-desc\">The system currently uses a demo-user selector on the dashboard. All roles share the same interface; access is differentiated by the grants assigned to each user.<\u002Fp>\n\n      <div class=\"personas\">\n        <div class=\"persona-card\">\n          <div class=\"persona-name\">🧑‍💼 Grant Manager<\u002Fdiv>\n          <div class=\"persona-role\">Primary · Program Officer<\u002Fdiv>\n          <div class=\"persona-goals\">\n            <ul>\n              <li>Monitor active grant portfolio<\u002Fli>\n              <li>Fill quarterly/annual reports<\u002Fli>\n              <li>Use AI to draft narrative sections<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"persona-card\">\n          <div class=\"persona-name\">📊 Program Director<\u002Fdiv>\n          <div class=\"persona-role\">Secondary · Oversight<\u002Fdiv>\n          <div class=\"persona-goals\">\n            <ul>\n              <li>Review submitted reports<\u002Fli>\n              <li>Check approval status &amp; ratings<\u002Fli>\n              <li>Query historical data via chat<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"persona-card\">\n          <div class=\"persona-name\">🏥 Organization Admin<\u002Fdiv>\n          <div class=\"persona-role\">Secondary · Multi-grant spacer\"><\u002Fspan>\n          <span class=\"wf-topnav-item\">Dashboard<\u002Fspan>\n          <span class=\"wf-topnav-item\">Reports<\u002Fspan>\n          <div class=\"wf-topnav-avatar\">JD<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"wf-page\">\n          <!-- Title -->\n          <div class=\"wf-page-title\">\n            <span class=\"wf-icon\">⊞<\u002Fspan>\n            My Grants\n          <\u002Fdiv>\n\n          <!-- User selector -->\n          <div class=\"wf-chips\">\n            <span class=\"wf-chip-label\">Demo user:<\u002Fspan>\n            <span class=\"wf-chip selected\">Maria Gomez<\u002Fspan>\n            <span class=\"wf-chip\">James Chen<\u002Fspan>\n            <span class=\"wf-chip\">Aisha Patel<\u002Fspan>\n          <\u002Fdiv>\n\n          <!-- Grant cards grid -->\n          <div class=\"wf-grid\">\n\n            <!-- Card 1 -->\n            <div class=\"wf-card\">\n              <div class=\"wf-card-head\">\n                <div class=\"wf-card-title\">H80CS12345<\u002Fdiv>\n                <div class=\"wf-card-sub\">FQHC · Community Health Access Program<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"wf-card-body\">\n                <div class=\"wf-card-meta\"><span class=\"wf-card-meta-icon\">🏢<\u002Fspan> Riverside Community Health<\u002Fdiv>\n                <div class=\"wf-card-meta\"><span class=\"wf-card-meta-icon\">👤<\u002Fspan> Maria Gomez<\u002Fdiv>\n                <div class=\"wf-card-meta\"><span class=\"wf-card-meta-icon\">💵<\u002Fspan> $2,450,000<\u002Fdiv>\n                <div class=\"wf-card-meta\"><span class=\"wf-card-meta-icon\">🏷<\u002Fspan> Primary Care, Dental, Behavioral Health<\u002Fdiv>\n                <div class=\"wf-badge wf-badge-active\">ACTIVE<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"wf-card-footer\">\n                <button class=\"wf-btn wf-btn-primary\">⊞ View Reports<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Card 2 -->\n            <div class=\"wf-card\">\n              <div class=\"wf-card-head\">\n                <div class=\"wf-card-title\">H80CS67890<\u002Fdiv>\n                <div class=\"wf-card-sub\">Expanded Services · Rural Outreach Initiative<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"wf-card-body\">\n                <div class=\"wf-card-meta\"><span class=\"wf-card-meta-icon\">🏢<\u002Fspan> Valley Health Partners<\u002Fdiv>\n                <div class=\"wf-card-meta\"><span class=\"wf-card-meta-icon\">👤<\u002Fspan> Maria Gomez<\u002Fdiv>\n                <div class=\"wf-card-meta\"><span class=\"wf-card-meta-icon\">💵<\u002Fspan> $890,000<\u002Fdiv>\n                <div class=\"wf-card-meta\"><span class=\"wf-card-meta-icon\">🏷<\u002Fspan> Telehealth, Pharmacy<\u002Fdiv>\n                <div class=\"wf-badge wf-badge-active\">ACTIVE<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"wf-card-footer\">\n                <button class=\"wf-btn wf-btn-primary\">⊞ View Reports<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Card 3 -->\n            <div class=\"wf-card\">\n              <div class=\"wf-card-head\">\n                <div class=\"wf-card-title\">H80CS11111<\u002Fdiv>\n                <div class=\"wf-card-sub\">FQHC · Urban Wellness Program<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"wf-card-body\">\n                <div class=\"wf-card-meta\"><span class=\"wf-card-meta-icon\">🏢<\u002Fspan> Metro Health Collaborative<\u002Fdiv>\n                <div class=\"wf-card-meta\"><span class=\"wf-card-meta-icon\">👤<\u002Fspan> Maria Gomez<\u002Fdiv>\n                <div class=\"wf-card-meta\"><span class=\"wf-card-meta-icon\">💵<\u002Fspan> —<\u002Fdiv>\n                <div class=\"wf-card-meta\"><span class=\"wf-card-meta-icon\">🏷<\u002Fspan> Enabling Services, Laboratory<\u002Fdiv>\n                <div class=\"wf-badge wf-badge-closed\">CLOSED<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"wf-card-footer\">\n                <button class=\"wf-btn wf-btn-primary\">⊞ View Reports<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Annotations -->\n      <div class=\"annotations\">\n        <div class=\"annotation\">\n          <span class=\"ann-num\">1<\u002Fspan>\n          <span>The <strong>user-selector chip row<\u002Fstrong> switches the active user for demo purposes. Switching reloads the grants grid via the Grants API (<code>GET /api/grants/user/{userId}<\u002Fcode>).<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"annotation\">\n          <span class=\"ann-num nav\">2<\u002Fspan>\n          <span><strong>\"View Reports\"<\u002Fstrong> navigates to <code>/grants/:grantId/reports<\u002Fcode> — the Report List screen for that specific grant.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"annotation\">\n          <span class=\"ann-num\">3<\u002Fspan>\n          <span>Grant cards show: grant number, type, program name, organization, assigned user, funding amount, focus areas, and status badge (Active/Closed).<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"annotation\">\n          <span class=\"ann-num ai\">4<\u002Fspan>\n          <span>The <strong>AI Chat Widget FAB<\u002Fstrong> floats in the bottom-right corner of this page (and all pages). Accessible at any point in the journey.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <hr class=\"section-divider\">\n\n    <!-- ═══════════════════════════════════════\n         SCREEN 2 — REPORT LIST\n    ══════════════════════════════════════════ -->\n    <section id=\"screen-report-list\" class=\"scroll-target wireframe-wrap\">\n      <div class=\"section-heading\">\n        <span class=\"section-num\">04<\u002Fspan>\n        <h2 class=\"section-title\">Report List<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"section-desc\">\n        All reports for a specific grant, displayed in a table. Reports are filtered by grant and show period, type, status, approval date, and reviewer rating. From here the user can edit a draft or view an approved report.\n      <\u002Fp>\n\n      <div class=\"wireframe-meta\">\n        <span class=\"wireframe-id\">SCREEN · 02 · REPORT LIST<\u002Fspan>\n        <span class=\"wireframe-route\">/grants/:grantId/reports<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"browser-chrome\">\n        <div class=\"chrome-dots\"><span class=\"chrome-dot\"><\u002Fspan><span class=\"chrome-dot\"><\u002Fspan><span class=\"chrome-dot\"><\u002Fspan><\u002Fdiv>\n        <div class=\"chrome-bar\">localhost:4200/grants/abc-123/reports<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"screen\">\n        <div class=\"wf-topnav\">\n          <span class=\"wf-topnav-logo\">🏛️ Grant Management AI<\u002Fspan>\n          <span class=\"wf-topnav-spacer\"><\u002Fspan>\n          <div class=\"wf-topnav-avatar\">MG<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"wf-page\">\n          <!-- Breadcrumb -->\n          <div class=\"wf-breadcrumb\">\n            <a href=\"#screen-dashboard\">← Dashboard<\u002Fa>\n            <span class=\"wf-breadcrumb-arrow\">/<\u002Fspan>\n            <span>H80CS12345<\u002Fspan>\n          <\u002Fdiv>\n\n          <!-- Title -->\n          <div class=\"wf-page-title\">\n            <span class=\"wf-icon\">📑<\u002Fspan>\n            H80CS12345 — Reports\n            <span style=\"font-size:14px; font-weight:400; color:var(--ink3);\">Community Health Access Program<\u002Fspan>\n          <\u002Fdiv>\n\n          <!-- Table -->\n          <table class=\"wf-table\">\n            <thead>\n              <tr>\n                <th>Period<\u002Fth>\n                <th>Type<\u002Fth>\n                <th>Status<\u002Fth>\n                <th>Approved<\u002Fth>\n                <th>Rating<\u002Fth>\n                <th><\u002Fth>\n              <\u002Ftr>\n            <\u002Fthead>\n            <tbody>\n              <tr>\n                <td>2024 Q1<\u002Ftd>\n                <td>Quarterly<\u002Ftd>\n                <td><span class=\"wf-badge wf-badge-approved\">APPROVED<\u002Fspan><\u002Ftd>\n                <td>Mar 15, 2024<\u002Ftd>\n                <td style=\"text-align:left;\">★★★★★<\u002Ftd>\n                <td><button class=\"wf-btn wf-btn-ghost\" style=\"font-size:10px; padding:4px 10px;\">👁 View<\u002Fbutton><\u002Ftd>\n              <\u002Ftr>\n              <tr>\n                <td>2024 Q2<\u002Ftd>\n                <td>Quarterly<\u002Ftd>\n                <td><span class=\"wf-badge wf-badge-approved\">APPROVED<\u002Fspan><\u002Ftd>\n                <td>Jun 20, 2024<\u002Ftd>\n                <td style=\"text-align:left;\">★★★★☆<\u002Ftd>\n                <td><button class=\"wf-btn wf-btn-ghost\" style=\"font-size:10px; padding:4px 10px;\">👁 View<\u002Fbutton><\u002Ftd>\n              <\u002Ftr>\n              <tr>\n                <td>2024 Q3<\u002Ftd>\n                <td>Quarterly<\u002Ftd>\n                <td><span class=\"wf-badge wf-badge-submitted\">SUBMITTED<\u002Fspan><\u002Ftd>\n                <td>—<\u002Ftd>\n                <td style=\"text-align:left; color:var(--border);\">—<\u002Ftd>\n                <td><button class=\"wf-btn wf-btn-ghost\" style=\"font-size:10px; padding:4px 10px;\">👁 View<\u002Fbutton><\u002Ftd>\n              <\u002Ftr>\n              <tr>\n                <td>2024 Q4<\u002Ftd>\n                <td>Quarterly<\u002Ftd>\n                <td><span class=\"wf-badge wf-badge-draft\">DRAFT<\u002Fspan><\u002Ftd>\n                <td>—<\u002Ftd>\n                <td style=\"text-align:left; color:var(--border);\">—<\u002Ftd>\n                <td><button class=\"wf-btn wf-btn-accent\" style=\"font-size:10px; padding:4px 10px;\">✏️ Fill Report<\u002Fbutton><\u002Ftd>\n              <\u002Ftr>\n              <tr>\n                <td>2024 Annual<\u002Ftd>\n                <td>Annual<\u002Ftd>\n                <td><span class=\"wf-badge wf-badge-draft\">DRAFT<\u002Fspan><\u002Ftd>\n                <td>—<\u002Ftd>\n                <td style=\"text-align:left; color:var(--border);\">—<\u002Ftd>\n                <td><button class=\"wf-btn wf-btn-accent\" style=\"font-size:10px; padding:4px 10px;\">✏️ Fill Report<\u002Fbutton><\u002Ftd>\n              <\u002Ftr>\n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"annotations\">\n        <div class=\"annotation\">\n          <span class=\"ann-num nav\">1<\u002Fspan>\n          <span><strong>Breadcrumb \"← Dashboard\"<\u002Fstrong> navigates back to <code>/dashboard<\u002Fcode>. This is the only back-navigation in the Report List.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"annotation\">\n          <span class=\"ann-num\">2<\u002Fspan>\n          <span>The <strong>action button<\u002Fstrong> in the last column changes based on status: <em>Draft<\u002Fem> → orange \"Fill Report\" button; <em>Approved / Submitted<\u002Fem> → grey \"View\" button.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"annotation\">\n          <span class=\"ann-num nav\">3<\u002Fspan>\n          <span>Both buttons navigate to <code>/reports/:reportId<\u002Fcode>, but the Report Form renders in <strong>edit mode<\u002Fstrong> for Draft and <strong>read-only mode<\u002Fstrong> for Approved/Submitted.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"annotation\">\n          <span class=\"ann-num\">4<\u002Fspan>\n          <span><strong>Reviewer Rating<\u002Fstrong> is displayed as star characters (★★★★★). Empty rating shows a dash. Rating is assigned externally by a reviewer and is not editable here.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <hr class=\"section-divider\">\n\n    <!-- ═══════════════════════════════════════\n         SCREEN 3 — REPORT FORM\n    ══════════════════════════════════════════ -->\n    <section id=\"screen-report-form\" class=\"scroll-target wireframe-wrap\">\n      <div class=\"section-heading\">\n        <span class=\"section-num\">05<\u002Fspan>\n        <h2 class=\"section-title\">Report Form — Draft Mode<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"section-desc\">\n        The core data-entry screen. Each report section is rendered as a card with an appropriate input type (Text, Number, MultiSelect, Radio). Draft reports show a Save button per section and an AI Suggestion panel for text sections.\n      <\u002Fp>\n\n      <div class=\"wireframe-meta\">\n        <span class=\"wireframe-id\">SCREEN · 03 · REPORT FORM (DRAFT)<\u002Fspan>\n        <span class=\"wireframe-route\">/reports/:reportId<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"browser-chrome\">\n        <div class=\"chrome-dots\"><span class=\"chrome-dot\"><\u002Fspan><span class=\"chrome-dot\"><\u002Fspan><span class=\"chrome-dot\"><\u002Fspan><\u002Fdiv>\n        <div class=\"chrome-bar\">localhost:4200/reports/report-789-draft<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"screen\">\n        <div class=\"wf-topnav\">\n          <span class=\"wf-topnav-logo\">🏛️ Grant Management AI<\u002Fspan>\n          <span class=\"wf-topnav-spacer\"><\u002Fspan>\n          <div class=\"wf-topnav-avatar\">MG<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"wf-page tall\">\n          <!-- Breadcrumb -->\n          <div class=\"wf-breadcrumb\">\n            <a href=\"#screen-report-list\">← Reports<\u002Fa>\n            <span class=\"wf-breadcrumb-arrow\">/<\u002Fspan>\n            <span>2024 Q4<\u002Fspan>\n          <\u002Fdiv>\n\n          <!-- Report header -->\n          <div class=\"wf-report-header\">\n            <div class=\"wf-report-grid\">\n              <div>\n                <div class=\"wf-field-label\">Grant<\u002Fdiv>\n                <div class=\"wf-field-value\">H80CS12345<\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div class=\"wf-field-label\">Period<\u002Fdiv>\n                <div class=\"wf-field-value\">2024 Q4<\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div class=\"wf-field-label\">Type<\u002Fdiv>\n                <div class=\"wf-field-value\">Quarterly<\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div class=\"wf-field-label\">Status<\u002Fdiv>\n                <span class=\"wf-badge wf-badge-draft\">DRAFT<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Section 1: Text -->\n          <div class=\"wf-section-card\">\n            <div class=\"wf-section-head\">\n              <span class=\"wf-section-num\">1<\u002Fspan>\n              <div>\n                <div class=\"wf-section-title-text\">Service Delivery Narrative <span class=\"wf-required\">Required<\u002Fspan><\u002Fdiv>\n                <div class=\"wf-section-question\">Describe the health services delivered this quarter, including patient outcomes and program highlights.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"wf-section-body\">\n              <div class=\"wf-textarea\" style=\"display:block; padding:8px; font-size:12px; color:var(--ink3);\">During Q4 2024, Riverside Community Health delivered comprehensive primary care services to 3,842 patients across our main clinic and two satellite locations…<\u002Fdiv>\n              <div class=\"wf-char-count\">342 / 5000<\u002Fdiv>\n\n              <!-- AI Suggestion panel -->\n              <div class=\"wf-ai-panel\">\n                <div class=\"wf-ai-header\">\n                  <span class=\"wf-ai-icon\">✨<\u002Fspan>\n                  <span class=\"wf-ai-label\">AI Suggestion<\u002Fspan>\n                  <span class=\"wf-ai-toggle\">+ Add key highlights<\u002Fspan>\n                <\u002Fdiv>\n                <div class=\"wf-ai-body\">\n                  <div class=\"wf-ai-meta\">1,243 tokens · $0.0024<\u002Fdiv>\n                  <div class=\"wf-ai-result\">\n                    \"During the fourth quarter of 2024, our program achieved a 92% patient satisfaction rate, extending telehealth services to three additional rural counties and increasing prescription access by 45%...\"\n                  <\u002Fdiv>\n                  <div class=\"wf-ai-actions\">\n                    <button class=\"wf-btn wf-btn-outline\" style=\"font-size:10px; padding:4px 10px;\">✓ Accept<\u002Fbutton>\n                    <button class=\"wf-btn wf-btn-ghost\" style=\"font-size:10px; padding:4px 10px;\">✕ Dismiss<\u002Fbutton>\n                    <button class=\"wf-btn wf-btn-ai\" style=\"font-size:10px; padding:4px 10px;\">↻ Regenerate<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"wf-section-footer\">\n              <button class=\"wf-btn wf-btn-outline\">💾 Save<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Section 2: Number -->\n          <div class=\"wf-section-card\">\n            <div class=\"wf-section-head\">\n              <span class=\"wf-section-num\">2<\u002Fspan>\n              <div>\n                <div class=\"wf-section-title-text\">Total Patients Served <span class=\"wf-required\">Required<\u002Fspan><\u002Fdiv>\n                <div class=\"wf-section-question\">Enter the total unduplicated patient count for this reporting period.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"wf-section-body\">\n              <div class=\"wf-field-label\" style=\"margin-bottom:6px;\">Total Patients Served<\u002Fdiv>\n              <input class=\"wf-number-input\" type=\"number\" value=\"3842\" readonly=\"\">\n            <\u002Fdiv>\n            <div class=\"wf-section-footer\">\n              <button class=\"wf-btn wf-btn-outline\">💾 Save<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Section 3: MultiSelect -->\n          <div class=\"wf-section-card\">\n            <div class=\"wf-section-head\">\n              <span class=\"wf-section-num\">3<\u002Fspan>\n              <div>\n                <div class=\"wf-section-title-text\">Services Provided<\u002Fdiv>\n                <div class=\"wf-section-question\">Select all service types delivered this quarter.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"wf-section-body\">\n              <div style=\"font-size:11px; color:var(--ink3); margin-bottom:6px;\">Select all that apply:<\u002Fdiv>\n              <div class=\"wf-multiselect\">\n                <span class=\"wf-ms-chip sel\">Primary Care<\u002Fspan>\n                <span class=\"wf-ms-chip sel\">Dental Services<\u002Fspan>\n                <span class=\"wf-ms-chip sel\">Behavioral Health<\u002Fspan>\n                <span class=\"wf-ms-chip\">Enabling Services<\u002Fspan>\n                <span class=\"wf-ms-chip\">Pharmacy<\u002Fspan>\n                <span class=\"wf-ms-chip\">Laboratory<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"wf-section-footer\">\n              <button class=\"wf-btn wf-btn-outline\">💾 Save<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Section 4: Radio -->\n          <div class=\"wf-section-card\">\n            <div class=\"wf-section-head\">\n              <span class=\"wf-section-num\">4<\u002Fspan>\n              <div>\n                <div class=\"wf-section-title-text\">Quality Improvement Implementation<\u002Fdiv>\n                <div class=\"wf-section-question\">Has your organization implemented the required quality improvement activities this quarter?<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"wf-section-body\">\n              <div style=\"font-size:11px; color:var(--ink3); margin-bottom:6px;\">Select one:<\u002Fdiv>\n              <div class=\"wf-multiselect\">\n                <span class=\"wf-ms-chip sel\">Yes – Fully Implemented<\u002Fspan>\n                <span class=\"wf-ms-chip\">Yes – Partially<\u002Fspan>\n                <span class=\"wf-ms-chip\">Planned<\u002Fspan>\n                <span class=\"wf-ms-chip\">No<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"wf-section-footer\">\n              <button class=\"wf-btn wf-btn-outline\">💾 Save<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"annotations\">\n        <div class=\"annotation\">\n          <span class=\"ann-num\">1<\u002Fspan>\n          <span>The <strong>report header card<\u002Fstrong> shows grant number, period, type and status. This is read-only metadata — not editable from this screen.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"annotation\">\n          <span class=\"ann-num\">2<\u002Fspan>\n          <span>Each section renders a different <strong>input type<\u002Fstrong> based on <code>responseType<\u002Fcode>: <em>Text<\u002Fem> → textarea; <em>Number<\u002Fem> → number input; <em>MultiSelect<\u002Fem> → chip toggle set; <em>Radio<\u002Fem> → single-select chips.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"annotation\">\n          <span class=\"ann-num ai\">3<\u002Fspan>\n          <span>The <strong>AI Suggestion panel<\u002Fstrong> only appears for <em>Text<\u002Fem> sections when the report is in <em>Draft<\u002Fem> status. Accepting a suggestion populates the textarea. User can also add key highlights to guide generation.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"annotation\">\n          <span class=\"ann-num nav\">4<\u002Fspan>\n          <span>Each section has its <strong>own Save button<\u002Fstrong>. Saving calls <code>PATCH /api/reports/sections/:sectionId<\u002Fcode>. A snackbar confirms success or failure.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"annotation\">\n          <span class=\"ann-num\">5<\u002Fspan>\n          <span>In <strong>Approved / read-only mode<\u002Fstrong>, all inputs are disabled, Save buttons are hidden, and the AI Suggestion panel is not shown.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <hr class=\"section-divider\">\n\n    <!-- ═══════════════════════════════════════\n         SCREEN 4 — AI SUGGESTION DETAIL\n    ══════════════════════════════════════════ -->\n    <section id=\"screen-ai-suggestion\" class=\"scroll-target wireframe-wrap\">\n      <div class=\"section-heading\">\n        <span class=\"section-num\">06<\u002Fspan>\n        <h2 class=\"section-title\">AI Suggestion — Expanded Detail<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"section-desc\">\n        Close-up of the AI Suggestion component embedded within each text section of the Report Form. Supports optional key highlights, generation, preview, acceptance, regeneration and dismissal.\n      <\u002Fp>\n\n      <div class=\"wireframe-meta\">\n        <span class=\"wireframe-id\">COMPONENT · AI SUGGESTION · ALL STATES<\u002Fspan>\n        <span class=\"wireframe-route\">Embedded in /reports/:reportId (Draft only)<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"screen\" style=\"border-radius:10px; border:1.5px solid var(--border);\">\n        <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px; padding:28px; background:#f7f6f3;\">\n\n          <!-- State 1: Idle -->\n          <div>\n            <div style=\"font-size:11px; font-weight:700; color:var(--ink3); margin-bottom:10px; text-transform:uppercase; letter-spacing:.08em;\">State A — Idle<\u002Fdiv>\n            <div class=\"wf-ai-panel\">\n              <div class=\"wf-ai-header\">\n                <span class=\"wf-ai-icon\">✨<\u002Fspan>\n                <span class=\"wf-ai-label\">AI Suggestion<\u002Fspan>\n                <span class=\"wf-ai-toggle\">+ Add highlights<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"wf-ai-body\" style=\"display:flex; justify-content:flex-end; padding:10px 12px;\">\n                <button class=\"wf-btn wf-btn-ai\" style=\"font-size:10px; padding:4px 12px;\">✨ Get AI Suggestion<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:11px; color:var(--ink3); margin-top:8px; line-height:1.5;\">Initial state. User clicks to request a suggestion from OpenAI.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- State 2: With Highlights + Loading -->\n          <div>\n            <div style=\"font-size:11px; font-weight:700; color:var(--ink3); margin-bottom:10px; text-transform:uppercase; letter-spacing:.08em;\">State B — Key Highlights<\u002Fdiv>\n            <div class=\"wf-ai-panel\">\n              <div class=\"wf-ai-header\">\n                <span class=\"wf-ai-icon\">✨<\u002Fspan>\n                <span class=\"wf-ai-label\">AI Suggestion<\u002Fspan>\n                <span class=\"wf-ai-toggle\">↑ Hide highlights<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"wf-ai-body\">\n                <div style=\"padding-bottom:8px;\">\n                  <textarea style=\"width:100%; border:1px solid #d7b8e8; border-radius:6px; padding:6px 8px; font-size:11px; font-family:inherit; resize:none; background:#fff; height:52px; color:var(--ink2);\" readonly=\"\">92% satisfaction rate, extended to 3 rural counties, telehealth up 45%<\u002Ftextarea>\n                  <div style=\"font-size:10px; color:#ab87c4; text-align:right;\">71/1000 · Woven into generated text<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex; justify-content:flex-end;\">\n                  <button class=\"wf-btn wf-btn-ai\" style=\"font-size:10px; padding:4px 12px; opacity:.6;\">⟳ Generating…<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:11px; color:var(--ink3); margin-top:8px; line-height:1.5;\">User added highlights; generation in progress.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- State 3: Result -->\n          <div>\n            <div style=\"font-size:11px; font-weight:700; color:var(--ink3); margin-bottom:10px; text-transform:uppercase; letter-spacing:.08em;\">State C — Result Ready<\u002Fdiv>\n            <div class=\"wf-ai-panel\">\n              <div class=\"wf-ai-header\">\n                <span class=\"wf-ai-icon\">✨<\u002Fspan>\n                <span class=\"wf-ai-label\">AI Suggestion<\u002Fspan>\n                <span class=\"wf-ai-toggle\">+ Add highlights<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"wf-ai-body\">\n                <div class=\"wf-ai-meta\">1,243 tokens · $0.0024<\u002Fdiv>\n                <div class=\"wf-ai-result\" style=\"font-size:10px; min-height:64px;\">\n                  \"During Q4 2024, our program achieved a 92% satisfaction rate, extending services to three rural counties and increasing telehealth adoption by 45% compared to the prior quarter…\"\n                <\u002Fdiv>\n                <div class=\"wf-ai-actions\">\n                  <button class=\"wf-btn wf-btn-outline\" style=\"font-size:10px; padding:4px 8px;\">✓ Accept<\u002Fbutton>\n                  <button class=\"wf-btn wf-btn-ghost\" style=\"font-size:10px; padding:4px 8px;\">✕ Dismiss<\u002Fbutton>\n                  <button class=\"wf-btn wf-btn-ai\" style=\"font-size:10px; padding:4px 8px;\">↻ Regen<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:11px; color:var(--ink3); margin-top:8px; line-height:1.5;\">Accept → fills textarea. Dismiss → clears panel. Regen → new request.<\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"annotations\" style=\"margin-top:16px;\">\n        <div class=\"annotation\">\n          <span class=\"ann-num ai\">1<\u002Fspan>\n          <span>Calls <code>POST /api/ai-suggestion<\u002Fcode> with <code>{ reportId, sectionName, userId, keyPoints }<\u002Fcode>. Response includes <code>suggestedText<\u002Fcode>, <code>tokensUsed<\u002Fcode>, and <code>estimatedCost<\u002Fcode>.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"annotation\">\n          <span class=\"ann-num ai\">2<\u002Fspan>\n          <span>The <strong>Key Highlights<\u002Fstrong> textarea (max 1000 chars) lets users guide the AI generation. The API weaves these into the generated narrative using the underlying OpenAI prompt.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"annotation\">\n          <span class=\"ann-num\">3<\u002Fspan>\n          <span>The suggestion text is <strong>editable<\u002Fstrong> before accepting — users can make inline tweaks directly in the result textarea before clicking Accept.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <hr class=\"section-divider\">\n\n    <!-- ═══════════════════════════════════════\n         SCREEN 5 — AI CHAT WIDGET\n    ══════════════════════════════════════════ -->\n    <section id=\"screen-chat\" class=\"scroll-target wireframe-wrap\">\n      <div class=\"section-heading\">\n        <span class=\"section-num\">07<\u002Fspan>\n        <h2 class=\"section-title\">AI Chat Widget<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"section-desc\">\n        A persistent floating chat panel accessible from every screen. Powered by semantic search (Qdrant vector store) and OpenAI. Users can ask natural-language questions about any grant's historical reports.\n      <\u002Fp>\n\n      <div class=\"wireframe-meta\">\n        <span class=\"wireframe-id\">COMPONENT · AI CHAT · GLOBAL OVERLAY<\u002Fspan>\n        <span class=\"wireframe-route\">Floats on all routes · FAB bottom-right<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"screen\" style=\"border-radius:10px; border:1.5px solid var(--border);\">\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:0; background:#f7f6f3; border-radius:0 0 10px 10px;\">\n\n          <!-- State A: Welcome / empty -->\n          <div style=\"padding:28px; border-right:1px solid var(--border2);\">\n            <div style=\"font-size:11px; font-weight:700; color:var(--ink3); margin-bottom:16px; text-transform:uppercase; letter-spacing:.08em;\">State A — Welcome (No messages)<\u002Fdiv>\n\n            <div style=\"position:relative; height:380px;\">\n              <div class=\"wf-chat-panel\" style=\"position:relative; bottom:auto; right:auto; width:100%;\">\n                <div class=\"wf-chat-header\">\n                  🤖 Grant Q&amp;A Assistant\n                  <span style=\"margin-left:auto; font-size:14px; cursor:pointer; opacity:.75;\">✕<\u002Fspan>\n                <\u002Fdiv>\n                <div class=\"wf-chat-grant-sel\">\n                  Grant:\n                  <select class=\"wf-chat-select\">\n                    <option>H80CS12345<\u002Foption>\n                    <option>H80CS67890<\u002Foption>\n                  <\u002Fselect>\n                <\u002Fdiv>\n                <div class=\"wf-chat-messages\">\n                  <div class=\"wf-chat-welcome\">\n                    <div class=\"wf-chat-welcome-icon\">✨<\u002Fdiv>\n                    <div class=\"wf-chat-welcome-text\">Ask me anything about your grant reports!<\u002Fdiv>\n                    <div class=\"wf-chat-suggestions\">\n                      <button class=\"wf-chat-suggestion\">What did I write about telehealth last quarter?<\u002Fbutton>\n                      <button class=\"wf-chat-suggestion\">How many patients did I serve in 2024?<\u002Fbutton>\n                      <button class=\"wf-chat-suggestion\">What challenges did I face in Q1 2024?<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"wf-chat-input\">\n                  <input type=\"text\" placeholder=\"Ask a question about your grants…\" readonly=\"\">\n                  <button class=\"wf-chat-send\">➤<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div class=\"wf-chat-fab\" style=\"position:absolute; bottom:0; right:0; width:44px; height:44px; font-size:18px;\">🤖<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- State B: With conversation + sources -->\n          <div style=\"padding:28px;\">\n            <div style=\"font-size:11px; font-weight:700; color:var(--ink3); margin-bottom:16px; text-transform:uppercase; letter-spacing:.08em;\">State B — Active Conversation<\u002Fdiv>\n\n            <div style=\"position:relative; height:380px;\">\n              <div class=\"wf-chat-panel\" style=\"position:relative; bottom:auto; right:auto; width:100%;\">\n                <div class=\"wf-chat-header\">\n                  🤖 Grant Q&amp;A Assistant\n                  <span style=\"margin-left:auto; font-size:14px; cursor:pointer; opacity:.75;\">✕<\u002Fspan>\n                <\u002Fdiv>\n                <div class=\"wf-chat-grant-sel\">\n                  Grant:\n                  <select class=\"wf-chat-select\"><option>H80CS12345<\u002Foption><\u002Fselect>\n                <\u002Fdiv>\n                <div class=\"wf-chat-messages\" style=\"gap:6px; display:flex; flex-direction:column;\">\n                  <div class=\"wf-chat-bubble user\">How many patients did I serve in Q3 2024?<\u002Fdiv>\n                  <div class=\"wf-chat-bubble assistant\">\n                    In Q3 2024, you served <strong>3,612 unduplicated patients<\u002Fstrong> across all service sites for grant H80CS12345.\n                    <div class=\"wf-source-item\">\n                      📄 <strong>2024 Q3 · Quarterly Report<\u002Fstrong> · Service Delivery Narrative<br>\n                      <span style=\"color:var(--ink3); font-style:italic;\">\"…3,612 unduplicated patients across our main clinic and satellite locations…\"<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"wf-chat-bubble user\">What telehealth achievements were reported?<\u002Fdiv>\n                  <div class=\"wf-chat-bubble assistant\" style=\"opacity:.6; font-style:italic; font-size:10px;\">⟳ Thinking…<\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"wf-chat-input\">\n                  <input type=\"text\" placeholder=\"Ask a question about your grants…\" readonly=\"\">\n                  <button class=\"wf-chat-send\">➤<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"annotations\">\n        <div class=\"annotation\">\n          <span class=\"ann-num ai\">1<\u002Fspan>\n          <span>The <strong>FAB<\u002Fstrong> (floating action button) is fixed to the bottom-right of the viewport. Clicking it toggles the chat panel open/closed with a spring animation.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"annotation\">\n          <span class=\"ann-num\">2<\u002Fspan>\n          <span>A <strong>grant selector dropdown<\u002Fstrong> scopes all questions to a specific grant. The list is loaded from the same grants visible on the Dashboard for the active user.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"annotation\">\n          <span class=\"ann-num ai\">3<\u002Fspan>\n          <span>Answers include <strong>source citations<\u002Fstrong> — snippets from the specific report section that supported the answer, with period and section name. Powered by Qdrant semantic vector search.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"annotation\">\n          <span class=\"ann-num\">4<\u002Fspan>\n          <span>The chat maintains a <strong>conversation ID<\u002Fstrong> for multi-turn context. Switching grants via the dropdown clears the conversation and starts fresh.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"annotation\">\n          <span class=\"ann-num ai\">5<\u002Fspan>\n          <span>Calls <code>POST /api/chatbot/ask<\u002Fcode> with <code>{ userId, grantId, question, conversationId }<\u002Fcode>. Response includes <code>answer<\u002Fcode>, <code>sources[]<\u002Fcode>, <code>conversationId<\u002Fcode>.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <hr class=\"section-divider\">\n\n    <!-- ═══════════════════════════════════════\n         SECTION — NAVIGATION FLOWS\n    ══════════════════════════════════════════ -->\n    <section id=\"nav-flows\" class=\"scroll-target\">\n      <div class=\"section-heading\">\n        <span class=\"section-num\">08<\u002Fspan>\n        <h2 class=\"section-title\">Navigation Flows Summary<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"section-desc\">All navigation paths in the application, including back-navigation and conditional routing.<\u002Fp>\n\n      <div style=\"background:#fff; border:1px solid var(--border); border-radius:10px; overflow:hidden;\">\n        <table class=\"wf-table\" style=\"font-size:13px;\">\n          <thead>\n            <tr>\n              <th>From<\u002Fth>\n              <th>Action<\u002Fth>\n              <th>To<\u002Fth>\n              <th>Condition<\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr>\n              <td><strong>App root<\u002Fstrong> <code style=\"font-size:11px;\">/<\u002Fcode><\u002Ftd>\n              <td>Auto-redirect<\u002Ftd>\n              <td>Dashboard <code style=\"font-size:11px;\">/dashboard<\u002Fcode><\u002Ftd>\n              <td>Always<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td><strong>Dashboard<\u002Fstrong><\u002Ftd>\n              <td>Select demo user chip<\u002Ftd>\n              <td>Dashboard (reloaded)<\u002Ftd>\n              <td>Demo mode only<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td><strong>Dashboard<\u002Fstrong><\u002Ftd>\n              <td>Click \"View Reports\"<\u002Ftd>\n              <td>Report List <code style=\"font-size:11px;\">/grants/:id/reports<\u002Fcode><\u002Ftd>\n              <td>Any grant card<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td><strong>Report List<\u002Fstrong><\u002Ftd>\n              <td>Click \"← Dashboard\"<\u002Ftd>\n              <td>Dashboard<\u002Ftd>\n              <td>Back navigation<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td><strong>Report List<\u002Fstrong><\u002Ftd>\n              <td>Click \"Fill Report\"<\u002Ftd>\n              <td>Report Form <code style=\"font-size:11px;\">/reports/:id<\u002Fcode><\u002Ftd>\n              <td>Report status = Draft<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td><strong>Report List<\u002Fstrong><\u002Ftd>\n              <td>Click \"View\"<\u002Ftd>\n              <td>Report Form <code style=\"font-size:11px;\">/reports/:id<\u002Fcode><\u002Ftd>\n              <td>Report status = Approved/Submitted<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td><strong>Report Form<\u002Fstrong><\u002Ftd>\n              <td>Click \"← Reports\"<\u002Ftd>\n              <td>Report List<\u002Ftd>\n              <td>Back navigation<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td><strong>Report Form (Draft)<\u002Fstrong><\u002Ftd>\n              <td>Click \"Get AI Suggestion\"<\u002Ftd>\n              <td>AI Suggestion inline result<\u002Ftd>\n              <td>Text sections only<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td><strong>Report Form (Draft)<\u002Fstrong><\u002Ftd>\n              <td>Accept AI suggestion<\u002Ftd>\n              <td>Textarea populated (same page)<\u002Ftd>\n              <td>After suggestion generated<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td><strong>Any screen<\u002Fstrong><\u002Ftd>\n              <td>Click chat FAB 🤖<\u002Ftd>\n              <td>Chat panel opens (overlay)<\u002Ftd>\n              <td>Always available<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td><strong>Chat panel<\u002Fstrong><\u002Ftd>\n              <td>Switch grant selector<\u002Ftd>\n              <td>Chat cleared, new context<\u002Ftd>\n              <td>Different grant selected<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td><strong>Unknown route<\u002Fstrong><\u002Ftd>\n              <td>Any navigation<\u002Ftd>\n              <td>Dashboard (wildcard redirect)<\u002Ftd>\n              <td><code style=\"font-size:11px;\">**<\u002Fcode> catch-all<\u002Ftd>\n            <\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <hr class=\"section-divider\">\n\n    <!-- ═══════════════════════════════════════\n         SECTION — STATES & STATUSES\n    ══════════════════════════════════════════ -->\n    <section id=\"states\" class=\"scroll-target\">\n      <div class=\"section-heading\">\n        <span class=\"section-num\">09<\u002Fspan>\n        <h2 class=\"section-title\">States &amp; Status Reference<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"section-desc\">Status values that drive conditional UI rendering throughout the application.<\u002Fp>\n\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:24px;\">\n\n        <!-- Grant statuses -->\n        <div style=\"background:#fff; border:1px solid var(--border); border-radius:10px; overflow:hidden;\">\n          <div style=\"padding:14px 18px; border-bottom:1px solid var(--border2); font-size:13px; font-weight:700;\">Grant Statuses<\u002Fdiv>\n          <div style=\"padding:16px 18px; display:flex; flex-direction:column; gap:12px;\">\n            <div style=\"display:flex; align-items:flex-start; gap:12px;\">\n              <span class=\"wf-badge wf-badge-active\">ACTIVE<\u002Fspan>\n              <span style=\"font-size:12px; color:var(--ink2);\">Grant is funded and active. All reports are accessible.<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:flex-start; gap:12px;\">\n              <span class=\"wf-badge wf-badge-closed\">CLOSED<\u002Fspan>\n              <span style=\"font-size:12px; color:var(--ink2);\">Grant period ended. Reports remain viewable but no new drafts can be created.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Report statuses -->\n        <div style=\"background:#fff; border:1px solid var(--border); border-radius:10px; overflow:hidden;\">\n          <div style=\"padding:14px 18px; border-bottom:1px solid var(--border2); font-size:13px; font-weight:700;\">Report Statuses<\u002Fdiv>\n          <div style=\"padding:16px 18px; display:flex; flex-direction:column; gap:12px;\">\n            <div style=\"display:flex; align-items:flex-start; gap:12px;\">\n              <span class=\"wf-badge wf-badge-draft\">DRAFT<\u002Fspan>\n              <span style=\"font-size:12px; color:var(--ink2);\">Editable. Shows \"Fill Report\" button. AI Suggestion available. Save enabled.<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:flex-start; gap:12px;\">\n              <span class=\"wf-badge wf-badge-submitted\">SUBMITTED<\u002Fspan>\n              <span style=\"font-size:12px; color:var(--ink2);\">Read-only. Awaiting reviewer action. Shows \"View\" button.<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:flex-start; gap:12px;\">\n              <span class=\"wf-badge wf-badge-approved\">APPROVED<\u002Fspan>\n              <span style=\"font-size:12px; color:var(--ink2);\">Read-only. Final state. May include reviewer rating (1–5 stars).<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Response types -->\n        <div style=\"background:#fff; border:1px solid var(--border); border-radius:10px; overflow:hidden;\">\n          <div style=\"padding:14px 18px; border-bottom:1px solid var(--border2); font-size:13px; font-weight:700;\">Section Response Types<\u002Fdiv>\n          <div style=\"padding:16px 18px; display:flex; flex-direction:column; gap:10px;\">\n            <div style=\"display:flex; gap:12px; font-size:12px;\"><code style=\"background:var(--surface2); padding:1px 6px; border-radius:3px; font-size:11px;\">Text<\u002Fcode><span style=\"color:var(--ink2);\">Textarea with character limit. AI Suggestion available.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:12px; font-size:12px;\"><code style=\"background:var(--surface2); padding:1px 6px; border-radius:3px; font-size:11px;\">Number<\u002Fcode><span style=\"color:var(--ink2);\">Numeric input field. No AI Suggestion.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:12px; font-size:12px;\"><code style=\"background:var(--surface2); padding:1px 6px; border-radius:3px; font-size:11px;\">MultiSelect<\u002Fcode><span style=\"color:var(--ink2);\">Toggle chip set. Multiple selections allowed.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:12px; font-size:12px;\"><code style=\"background:var(--surface2); padding:1px 6px; border-radius:3px; font-size:11px;\">Radio<\u002Fcode><span style=\"color:var(--ink2);\">Single-select chip set. Mutually exclusive choices.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- AI features -->\n        <div style=\"background:var(--ai-light); border:1px dashed var(--ai); border-radius:10px; overflow:hidden;\">\n          <div style=\"padding:14px 18px; border-bottom:1px dashed #e1bee7; font-size:13px; font-weight:700; color:var(--ai);\">🤖 AI Features<\u002Fdiv>\n          <div style=\"padding:16px 18px; display:flex; flex-direction:column; gap:12px;\">\n            <div style=\"font-size:12px; color:var(--ink2);\">\n              <strong style=\"color:var(--ai);\">Content Suggestion<\u002Fstrong><br>\n              OpenAI-generated narrative text per report section. Guided by user-supplied key highlights. Logs token usage and estimated cost.\n            <\u002Fdiv>\n            <div style=\"font-size:12px; color:var(--ink2);\">\n              <strong style=\"color:var(--ai);\">Q&amp;A Chatbot<\u002Fstrong><br>\n              Semantic search via Qdrant vector store over all approved report sections. Multi-turn conversation with source citations.\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n<script>\n  // Highlight active sidebar link on scroll\n  const sections = document.querySelectorAll('.scroll-target');\n  const links = document.querySelectorAll('.sidebar-link');\n\n  const observer = new IntersectionObserver((entries) => {\n    entries.forEach(entry => {\n      if (entry.isIntersecting) {\n        links.forEach(l => l.classList.remove('active'));\n        const id = entry.target.id;\n        const link = document.querySelector(`.sidebar-link[href=\"#${id}\"]`);\n        if (link) link.classList.add('active');\n      }\n    });\n  }, { threshold: 0.3 });\n\n  sections.forEach(s => observer.observe(s));\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
